name: Build Docker

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build \
          . \
          --file Dockerfile \
          --tag amulet-editor:latest \
          --build-arg AMULET_VERSION=CUSTOM:git+https://github.com/Amulet-Team/Amulet-Map-Editor.git@${{ github.event.release.tag_name }}

    - name: Save and compress Docker image
      run: |
        docker save amulet-editor:latest | xz -9e > Amulet-v${{ github.event.release.tag_name }}-docker.tar.gz

    - name: Upload Release Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
          Amulet-v${{ github.event.release.tag_name }}-docker.tar.gz#Amulet-v${{ github.event.release.tag_name }}-docker.tar.gz
